# https://docs.amvera.ru/applications/environments/nodejs-server.html
# Amvera не подставляет переменные из UI на этап сборки — NEXT_PUBLIC_* см. .env.production в репо.
meta:
  environment: node
  toolchain:
    name: npm
    # Sanity 5 / next-sanity 12: engines >=20.19 || >=22.12
    version: '22'

build:
  additionalCommands: npm run build

run:
  # Без npm run start: при SIGTERM при деплое npm пишет "npm error" и панель ругается на лог.
  # Прямой вызов next — тот же процесс, без лишних строк в логе.
  command: node node_modules/next/dist/bin/next start -p 80 -H 0.0.0.0
  containerPort: 80
